name: tungbach
description: "A new Flutter project."
publish_to: 'none'
version: 1.2.1+1
environment:
  sdk: '>=3.11.1'
  flutter: '>=3.38.1'
dependencies:
  bloc: ^9.1.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.1
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  gap: 3.0.1
  get_it: ^9.0.5
  go_router: ^17.0.0
  google_fonts: ^8.0.1
  injectable: ^2.5.2
  responsive_framework: ^1.5.1
  url_launcher: ^6.3.2
  vector_graphics: ^1.1.19
dev_dependencies:
  build_runner: ^2.4.13
  flutter_gen_runner: ^5.12.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  injectable_generator: ^2.9.0
  json_serializable: ^6.8.0
  very_good_analysis: ^10.0.0
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - images/
    - icons/
    - fonts/
  fonts:
    - family: SocialIconFont
      fonts:
        - asset: fonts/social-icon-font.woff2
flutter_launcher_icons:
  image_path: "assets/logo.png"
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter_gen:
  output: lib/resources/gen/
  integrations:
    flutter_svg: true
  assets:
    outputs:
      class_name: AppAssets
  fonts:
    outputs:
      class_name: AppFonts
  colors:
    inputs:
      - colors/colors.xml
    outputs:
      class_name: AppColors